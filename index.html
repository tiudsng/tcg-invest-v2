<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCG Invest - Apple Style Bento Grid</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* 價格閃爍動畫：閃爍綠光 */
        @keyframes flashGreen {
            0% { background-color: transparent; color: #ffffff; }
            20% { background-color: #30d158; color: #000000; border-radius: 4px; padding: 0 4px; }
            100% { background-color: transparent; color: #ffffff; }
        }

        .price-flash {
            animation: flashGreen 1s ease-out;
        }

        /* 磨砂玻璃效果 */
        .glass {
            background: rgba(28, 28, 30, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="p-6 sm:p-12">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="mb-12 text-center">
            <h1 class="text-4xl sm:text-5xl font-black tracking-tight mb-4">
                市場即時行情
            </h1>
            <p class="text-gray-500 font-medium text-lg">Apple Style Bento Grid / Live Data</p>
        </div>

        <!-- Bento Grid 容器 -->
        <div id="tcg-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- 數據加載中狀態 -->
            <div class="col-span-full py-20 text-center text-gray-600">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blue-500 mb-4"></div>
                <p>正在連接至 Firestore...</p>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 1. 你的真實 Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyDswhKXm7KqaHV02kb2PQ6qmarySPcZyJ0",
            authDomain: "gen-lang-client-0326385388.firebaseapp.com",
            projectId: "gen-lang-client-0326385388",
            storageBucket: "gen-lang-client-0326385388.firebasestorage.app",
            messagingSenderId: "122336191579",
            appId: "1:122336191579:web:2de07c0acb51b8b24c8b7e"
        };

        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        // 如果你有特定的 Database ID，請在此處填寫，否則預設為 (default)
        const db = getFirestore(app, "ai-studio-dac23e7c-cc41-4b77-8dea-7e8421e03c6a");

        // 用於追蹤舊價格，判斷是否需要閃爍
        const priceCache = {};

        // 2. 監聽 Firestore 數據
        const q = query(collection(db, "products"), orderBy("rank", "asc"));
        
        onSnapshot(q, (snapshot) => {
            const products = [];
            snapshot.forEach((doc) => {
                products.push({ id: doc.id, ...doc.data() });
            });
            renderGrid(products);
        });

        // 3. 渲染 UI
        function renderGrid(products) {
            const container = document.getElementById('tcg-grid');
            if (products.length === 0) {
                container.innerHTML = '<p class="col-span-full text-center text-gray-500">目前沒有數據</p>';
                return;
            }

            let html = '';
            
            // 分拆數據：NO.1, NO.2-3, 其餘
            const top1 = products[0];
            const top2and3 = products.slice(1, 3);
            const others = products.slice(3);

            // 輔助函數：判斷價格是否變動
            const getPriceClass = (id, price) => {
                const key = `price_${id}`;
                let className = "";
                if (priceCache[key] !== undefined && priceCache[key] !== price) {
                    className = "price-flash"; // 觸發閃爍
                }
                priceCache[key] = price;
                return className;
            };

            // 渲染 NO.1 (大格)
            if (top1) {
                const pClass = getPriceClass(top1.id, top1.market_data?.snkrdunk_price);
                html += `
                <div class="col-span-1 md:col-span-2 glass rounded-[2.5rem] p-8 flex flex-col md:flex-row gap-8 items-center shadow-2xl relative overflow-hidden group">
                    <div class="absolute top-4 left-6 text-6xl opacity-20 font-black italic select-none">01</div>
                    <div class="w-48 h-64 shrink-0 rounded-2xl overflow-hidden shadow-xl transform group-hover:scale-105 transition-transform duration-500">
                        <img src="${top1.image_url}" class="w-full h-full object-cover" referrerpolicy="no-referrer">
                    </div>
                    <div class="flex-1 text-center md:text-left">
                        <span class="inline-block px-3 py-1 bg-blue-500 text-white text-[10px] font-bold rounded-full mb-4 uppercase tracking-widest">Market Leader</span>
                        <h2 class="text-3xl font-bold mb-2">${top1.name_zh}</h2>
                        <p class="text-gray-500 mb-6 font-medium">${top1.set_name || 'Premium Collection'}</p>
                        <div class="flex items-center justify-center md:justify-start gap-4">
                            <span class="text-4xl font-black ${pClass}">HK$ ${(top1.market_data?.snkrdunk_price || 0).toLocaleString()}</span>
                            <span class="text-lg font-bold ${top1.market_data?.change_24h?.startsWith('+') ? 'text-green-400' : 'text-red-400'}">
                                ${top1.market_data?.change_24h || '0%'}
                            </span>
                        </div>
                    </div>
                </div>
                `;
            }

            // 渲染 NO.2 & NO.3 (中格)
            top2and3.forEach((item, idx) => {
                const pClass = getPriceClass(item.id, item.market_data?.snkrdunk_price);
                html += `
                <div class="glass rounded-[2rem] p-6 flex gap-6 items-center shadow-xl group">
                    <div class="w-24 h-32 shrink-0 rounded-xl overflow-hidden shadow-lg">
                        <img src="${item.image_url}" class="w-full h-full object-cover" referrerpolicy="no-referrer">
                    </div>
                    <div class="min-w-0">
                        <span class="text-gray-600 font-black text-xl italic">0${idx + 2}</span>
                        <h3 class="text-lg font-bold truncate mb-1">${item.name_zh}</h3>
                        <div class="flex flex-col">
                            <span class="text-2xl font-black ${pClass}">HK$ ${(item.market_data?.snkrdunk_price || 0).toLocaleString()}</span>
                            <span class="text-sm font-bold ${item.market_data?.change_24h?.startsWith('+') ? 'text-green-400' : 'text-red-400'}">
                                ${item.market_data?.change_24h || '0%'}
                            </span>
                        </div>
                    </div>
                </div>
                `;
            });

            // 渲染其餘 (列表)
            if (others.length > 0) {
                html += `<div class="col-span-1 md:col-span-2 space-y-3 mt-4">`;
                others.forEach(item => {
                    const pClass = getPriceClass(item.id, item.market_data?.snkrdunk_price);
                    html += `
                    <div class="glass rounded-2xl p-4 flex items-center gap-4 hover:bg-white/5 transition-colors">
                        <span class="w-8 text-gray-600 font-bold text-center">${item.rank}</span>
                        <div class="w-12 h-16 shrink-0 rounded-lg overflow-hidden">
                            <img src="${item.image_url}" class="w-full h-full object-cover" referrerpolicy="no-referrer">
                        </div>
                        <div class="flex-1 min-w-0">
                            <h4 class="font-bold truncate">${item.name_zh}</h4>
                            <p class="text-xs text-gray-500 truncate">${item.set_name || '-'}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-black ${pClass}">HK$ ${(item.market_data?.snkrdunk_price || 0).toLocaleString()}</p>
                            <p class="text-xs font-bold ${item.market_data?.change_24h?.startsWith('+') ? 'text-green-400' : 'text-red-400'}">
                                ${item.market_data?.change_24h || '0%'}
                            </p>
                        </div>
                    </div>
                    `;
                });
                html += `</div>`;
            }

            container.innerHTML = html;
        }
    </script>
</body>
</html>
