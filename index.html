<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCG 實時價格排行榜 | Apple Style Bento</title>
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --apple-bg: #000000;
            --apple-card: #1c1c1e;
            --apple-card-hover: #2c2c2e;
            --apple-text: #ffffff;
            --apple-gray: #86868b;
        }

        body {
            background-color: var(--apple-bg);
            color: var(--apple-text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* 價格閃爍特效 - 純 CSS 動畫 */
        @keyframes flashGreen {
            0% { color: #22c55e; text-shadow: 0 0 20px rgba(34, 197, 94, 0.6); transform: scale(1.05); }
            100% { color: inherit; text-shadow: none; transform: scale(1); }
        }

        .price-flash {
            animation: flashGreen 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Apple Style Bento Card */
        .bento-card {
            background-color: var(--apple-card);
            border-radius: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
            position: relative;
        }

        .bento-card:hover {
            transform: translateY(-8px) scale(1.01);
            background-color: var(--apple-card-hover);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            border-color: rgba(255, 255, 255, 0.1);
        }

        /* 漸變文字 */
        .text-gradient {
            background: linear-gradient(180deg, #ffffff 0%, #86868b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 隱藏滾動條 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 圖片光澤 */
        .img-container::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 50%);
            pointer-events: none;
        }
    </style>
</head>
<body class="p-4 sm:p-8">

    <div class="max-w-6xl mx-auto py-12 sm:py-24">
        <!-- Header Section -->
        <header class="text-center mb-20">
            <h1 class="text-5xl sm:text-7xl font-black tracking-tighter mb-6 text-gradient">
                價格實時排行榜
            </h1>
            <div class="flex items-center justify-center gap-3">
                <div class="flex items-center gap-2 px-4 py-2 bg-blue-500/10 rounded-full border border-blue-500/20">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                    </span>
                    <span class="text-blue-400 font-bold tracking-widest uppercase text-[10px] sm:text-xs">
                        Live Data Syncing
                    </span>
                </div>
            </div>
        </header>

        <!-- Bento Grid Container -->
        <div id="bento-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-8">
            <!-- JavaScript 將在此動態生成卡片，不使用 JSX -->
            <div class="col-span-full text-center py-20">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blue-500"></div>
                <p class="mt-4 text-gray-500 font-medium">正在連接 TCG 數據庫...</p>
            </div>
        </div>

        <!-- Footer / Expand Section -->
        <div id="expand-container" class="mt-12 hidden">
            <button id="toggle-list" class="w-full py-6 bento-card flex items-center justify-center gap-3 text-sm font-bold hover:bg-white/5 transition-colors">
                <span id="toggle-text">查看其餘排名數據</span>
                <svg id="toggle-icon" class="w-5 h-5 transition-transform duration-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </button>
            <div id="list-view" class="mt-8 space-y-4 hidden">
                <!-- 其餘排名由 JS 填入 -->
            </div>
        </div>
    </div>

    <!-- Firebase SDK (v10) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // --- Firebase 配置 ---
        const firebaseConfig = {
            apiKey: "AIzaSyDSwhKXm7KqaHVO2kb2PQ6qmarySPcZyJ0",
            authDomain: "gen-lang-client-0326385388.firebaseapp.com",
            projectId: "gen-lang-client-0326385388",
            storageBucket: "gen-lang-client-0326385388.firebasestorage.app",
            messagingSenderId: "122336191579",
            appId: "1:122336191579:web:2de07c0acb51b8b24c8b7e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app, "ai-studio-dac23e7c-cc41-4b77-8dea-7e8421e03c6a");

        // 狀態追蹤
        let lastPrices = {};
        let isExpanded = false;

        // 格式化價格
        const formatHKD = (val) => new Intl.NumberFormat('zh-HK', { style: 'currency', currency: 'HKD', minimumFractionDigits: 0 }).format(val || 0);

        // 渲染函數 (Vanilla JS)
        function renderUI(products) {
            const grid = document.getElementById('bento-grid');
            const listView = document.getElementById('list-view');
            const expandContainer = document.getElementById('expand-container');

            if (!products.length) return;

            const top1 = products[0];
            const top2 = products[1];
            const top3 = products[2];
            const others = products.slice(3);

            // --- 渲染 NO.1 (大卡片) ---
            let gridHtml = `
                <div class="col-span-1 sm:col-span-2 bento-card p-8 sm:p-12 flex flex-col md:flex-row gap-8 sm:gap-16 items-center">
                    <div class="absolute -top-10 -left-10 text-[12rem] opacity-[0.03] font-black italic select-none">01</div>
                    <div class="w-full md:w-72 aspect-[3/4] shrink-0 rounded-[2rem] overflow-hidden shadow-2xl border border-white/10 relative img-container">
                        <img src="${top1.image_url}" class="w-full h-full object-cover" referrerPolicy="no-referrer">
                    </div>
                    <div class="flex-1 text-center md:text-left">
                        <div class="inline-block px-4 py-1 bg-white text-black text-[10px] font-black rounded-full uppercase tracking-widest mb-6">Market Leader</div>
                        <h2 class="text-6xl sm:text-8xl font-black tracking-tighter mb-4">NO.1</h2>
                        <h3 class="text-2xl sm:text-4xl font-bold mb-8 leading-tight">
                            ${top1.name_zh}
                            <span class="block text-lg text-gray-500 mt-2 font-medium">[${top1.set_name || 'TCG'}]</span>
                        </h3>
                        <div class="flex flex-wrap justify-center md:justify-start items-baseline gap-6">
                            <span class="text-4xl sm:text-6xl font-black tracking-tighter ${top1.market_data?.change_24h?.startsWith('+') ? 'text-green-400' : 'text-red-400'}">
                                ${top1.market_data?.change_24h || '-'}
                            </span>
                            <span id="price-${top1.id}" class="text-3xl sm:text-5xl font-bold text-white transition-all duration-500">
                                ${formatHKD(top1.market_data?.snkrdunk_price)}
                            </span>
                        </div>
                    </div>
                </div>
            `;

            // --- 渲染 NO.2 & NO.3 (兩欄) ---
            [top2, top3].forEach((card, idx) => {
                if (!card) return;
                gridHtml += `
                    <div class="bento-card p-8 flex gap-6 items-center">
                        <div class="absolute top-4 right-8 text-6xl opacity-[0.03] font-black italic">0${idx + 2}</div>
                        <div class="w-24 sm:w-32 aspect-[3/4] shrink-0 rounded-2xl overflow-hidden shadow-xl border border-white/10 img-container">
                            <img src="${card.image_url}" class="w-full h-full object-cover" referrerPolicy="no-referrer">
                        </div>
                        <div class="flex-1">
                            <span class="text-3xl font-black tracking-tighter block mb-1">NO.${card.rank}</span>
                            <h3 class="text-base font-bold line-clamp-2 mb-4 h-12">${card.name_zh}</h3>
                            <div class="flex flex-col">
                                <span id="price-${card.id}" class="text-xl font-bold text-white">${formatHKD(card.market_data?.snkrdunk_price)}</span>
                                <span class="text-sm font-bold ${card.market_data?.change_24h?.startsWith('+') ? 'text-green-400' : 'text-red-400'}">
                                    ${card.market_data?.change_24h || '-'}
                                </span>
                            </div>
                        </div>
                    </div>
                `;
            });

            grid.innerHTML = gridHtml;

            // --- 渲染其餘列表 ---
            if (others.length > 0) {
                expandContainer.classList.remove('hidden');
                let listHtml = "";
                others.forEach(card => {
                    listHtml += `
                        <div class="bento-card p-5 flex items-center gap-6 rounded-3xl">
                            <div class="w-8 font-black text-gray-700 text-xl italic">${card.rank}</div>
                            <div class="w-12 aspect-[3/4] shrink-0 rounded-lg overflow-hidden border border-white/10">
                                <img src="${card.image_url}" class="w-full h-full object-cover" referrerPolicy="no-referrer">
                            </div>
                            <div class="flex-1 min-w-0">
                                <h4 class="font-bold truncate text-sm">${card.name_zh}</h4>
                                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">${card.set_name || 'TCG'}</p>
                            </div>
                            <div class="text-right">
                                <div class="font-black text-base" id="price-${card.id}">${formatHKD(card.market_data?.snkrdunk_price)}</div>
                                <div class="text-[10px] font-bold ${card.market_data?.change_24h?.startsWith('+') ? 'text-green-400' : 'text-red-400'}">
                                    ${card.market_data?.change_24h || '-'}
                                </div>
                            </div>
                        </div>
                    `;
                });
                listView.innerHTML = listHtml;
            }

            // 檢查價格變動並觸發閃爍
            products.forEach(p => {
                const currentPrice = p.market_data?.snkrdunk_price;
                if (lastPrices[p.id] !== undefined && lastPrices[p.id] !== currentPrice) {
                    const el = document.getElementById(`price-${p.id}`);
                    if (el) {
                        el.classList.remove('price-flash');
                        void el.offsetWidth; // 強制重繪
                        el.classList.add('price-flash');
                    }
                }
                lastPrices[p.id] = currentPrice;
            });
        }

        // 監聽數據庫
        const q = query(collection(db, "products"), orderBy("rank", "asc"));
        onSnapshot(q, (snapshot) => {
            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderUI(data);
        });

        // 展開/收起邏輯
        document.getElementById('toggle-list').addEventListener('click', () => {
            isExpanded = !isExpanded;
            const listView = document.getElementById('list-view');
            const icon = document.getElementById('toggle-icon');
            const text = document.getElementById('toggle-text');
            
            if (isExpanded) {
                listView.classList.remove('hidden');
                icon.style.transform = 'rotate(180deg)';
                text.innerText = '收起詳細排名';
            } else {
                listView.classList.add('hidden');
                icon.style.transform = 'rotate(0deg)';
                text.innerText = '查看其餘排名數據';
            }
        });
    </script>
</body>
</html>
