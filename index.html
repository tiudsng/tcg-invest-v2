<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TCG INVEST | 實時監控中心</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --apple-bg: #000; --apple-card: #1c1c1e; --apple-gold: #d4af37; --apple-green: #34c759; }
        body { background-color: var(--apple-bg); color: #fff; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .bento-card { background-color: var(--apple-card); border-radius: 2.5rem; border: 1px solid rgba(255,255,255,0.05); transition: all 0.5s ease; overflow: hidden; position: relative; }
        .bento-card:hover { transform: translateY(-5px); background-color: #2c2c2e; }
        .text-gold { background: linear-gradient(135deg, #f9d423 0%, #d4af37 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        @keyframes flashGreen { 0% { color: var(--apple-green); text-shadow: 0 0 15px rgba(52,199,89,0.5); } 100% { color: inherit; text-shadow: none; } }
        .price-flash { animation: flashGreen 1.5s ease-out; }
        #rank-list { transition: max-height 0.6s ease; max-height: 0; opacity: 0; overflow: hidden; }
        #rank-list.expanded { max-height: 2000px; opacity: 1; margin-top: 1.5rem; }
    </style>
</head>
<body class="p-4 sm:p-8">
    <div class="max-w-5xl mx-auto space-y-10">
        <header class="flex justify-between items-center py-4">
            <h1 class="text-3xl font-black tracking-tighter italic">TCG INVEST</h1>
            <div class="flex items-center gap-4 text-[10px] font-bold text-gray-500 uppercase tracking-widest">Live Monitoring</div>
        </header>

        <!-- 排行榜區 -->
        <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div id="no1-card" class="col-span-1 md:col-span-2">
                <div class="bento-card p-8 sm:p-12 flex flex-col md:flex-row gap-8 items-center min-h-[450px]">
                    <img id="no1-img" src="" class="w-full md:w-72 aspect-[3/4] object-contain relative z-10 drop-shadow-2xl">
                    <div class="flex-1 space-y-6 z-10 text-center md:text-left">
                        <span class="px-3 py-1 bg-blue-600 text-[10px] font-black rounded-full uppercase tracking-widest">Market Leader</span>
                        <h3 id="no1-name" class="text-4xl sm:text-6xl font-black tracking-tighter leading-none">同步中...</h3>
                        <div class="flex flex-wrap justify-center md:justify-start items-baseline gap-6">
                            <span id="no1-price" class="text-5xl sm:text-7xl font-black text-gold tracking-tighter">HK$ --</span>
                            <span id="no1-change" class="text-green-400 font-black text-2xl">+0.0%</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="bento-card p-6 flex items-center gap-6 h-full">
                <img id="no2-img" src="" class="w-24 aspect-[3/4] object-contain">
                <div class="flex-1"><span class="text-xs font-black opacity-20 block mb-1 uppercase">NO.2</span><h4 id="no2-name" class="font-bold text-sm truncate mb-2">---</h4><p id="no2-price" class="text-2xl font-black text-white">HK$ --</p></div>
            </div>
            <div class="bento-card p-6 flex items-center gap-6 h-full">
                <img id="no3-img" src="" class="w-24 aspect-[3/4] object-contain">
                <div class="flex-1"><span class="text-xs font-black opacity-20 block mb-1 uppercase">NO.3</span><h4 id="no3-name" class="font-bold text-sm truncate mb-2">---</h4><p id="no3-price" class="text-2xl font-black text-white">HK$ --</p></div>
            </div>
        </section>

        <!-- 情報區 -->
        <section class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div class="bento-card p-8 bg-gradient-to-br from-blue-600 to-blue-400 !text-white">
                <p class="text-xs font-bold uppercase tracking-widest opacity-80 mb-2">本週焦點情報</p>
                <h3 id="news-content" class="text-xl font-bold leading-tight">正在同步 AI 情報...</h3>
            </div>
            <div class="bento-card p-8 border-dashed border-2 border-white/10 flex flex-col justify-center">
                <p class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">趨勢分析</p>
                <p id="trend-content" class="text-base font-semibold leading-snug">正在分析市場大數據...</p>
            </div>
        </section>

        <button id="expand-btn" class="w-full py-6 bento-card flex items-center justify-center gap-3 text-sm font-bold hover:bg-white/5 transition-all">查看完整排行榜 ⌄</button>
        <div id="rank-list" class="space-y-3"></div>
        <footer class="py-20 text-center opacity-30 text-[10px] font-bold tracking-widest uppercase">AI Driven by OpenClaw</footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, limit, onSnapshot, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDSwhKXm7KqaHVO2kb2PQ6qmarySPcZyJ0", 
            authDomain: "gen-lang-client-0326385388.firebaseapp.com", 
            projectId: "gen-lang-client-0326385388", 
            storageBucket: "gen-lang-client-0326385388.firebasestorage.app", 
            messagingSenderId: "122336191579", 
            appId: "1:122336191579:web:2de07c0acb51b8b24c8b7e" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app, "abcd"); // 🚀 確保對接到 abcd 資料庫

        let lastPrices = {};
        const formatHKD = (val) => new Intl.NumberFormat('zh-HK', { style: 'currency', currency: 'HKD', minimumFractionDigits: 0 }).format(val || 0);

        onSnapshot(query(collection(db, "card_prices"), orderBy("latest_price_hkd", "desc"), limit(10)), (snapshot) => {
            const cards = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            if (cards.length > 0) renderUI(cards);
        });

        onSnapshot(doc(db, "site_meta", "headlines"), (docSnap) => {
            if (docSnap.exists()) {
                document.getElementById('news-content').innerText = docSnap.data().content || "";
                document.getElementById('trend-content').innerText = docSnap.data().trend || "";
            }
        });

        function renderUI(data) {
            document.getElementById('no1-name').innerText = data[0].card_name;
            document.getElementById('no1-price').innerText = formatHKD(data[0].latest_price_hkd);
            document.getElementById('no1-img').src = data[0].url;
            document.getElementById('no1-change').innerText = (data[0].change_percent || '+0.0') + '%';
            if (data[1]) { document.getElementById('no2-name').innerText = data[1].card_name; document.getElementById('no2-price').innerText = formatHKD(data[1].latest_price_hkd); document.getElementById('no2-img').src = data[1].url; }
            if (data[2]) { document.getElementById('no3-name').innerText = data[2].card_name; document.getElementById('no3-price').innerText = formatHKD(data[2].latest_price_hkd); document.getElementById('no3-img').src = data[2].url; }
            
            let listHtml = "";
            data.slice(3).forEach((c, i) => {
                listHtml += `<div class="bento-card p-5 flex items-center justify-between bg-white/5"><div class="flex items-center gap-4"><span class="text-xs font-black opacity-20 w-4">${i+4}</span><img src="${c.url}" class="w-10 h-10 object-contain"><p class="text-sm font-bold truncate w-32 sm:w-64">${c.card_name}</p></div><div class="text-right"><p id="price-${c.id}" class="text-sm font-black text-[#d4af37]">${formatHKD(c.latest_price_hkd)}</p></div></div>`;
            });
            document.getElementById('rank-list').innerHTML = listHtml;

            data.forEach(c => {
                if (lastPrices[c.id] !== undefined && lastPrices[c.id] !== c.latest_price_hkd) {
                    const el = document.getElementById(c.id === data[0].id ? 'no1-price' : `price-${c.id}`);
                    if (el) { el.classList.remove('price-flash'); void el.offsetWidth; el.classList.add('price-flash'); }
                }
                lastPrices[c.id] = c.latest_price_hkd;
            });
        }

        document.getElementById('expand-btn').addEventListener('click', () => document.getElementById('rank-list').classList.toggle('expanded'));
    </script>
</body>
</html>
