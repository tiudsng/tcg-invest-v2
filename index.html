<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TCG INVEST | 專業卡價監控</title>
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --apple-bg: #000000;
            --apple-card: #1c1c1e;
            --apple-card-hover: #2c2c2e;
            --apple-gold: #d4af37;
            --apple-text: #ffffff;
            --apple-gray: #86868b;
            --apple-green: #34c759;
        }

        body {
            background-color: var(--apple-bg);
            color: var(--apple-text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* Bento Grid 高級感 */
        .bento-card {
            background-color: var(--apple-card);
            border-radius: 2.5rem; /* rounded-3xl */
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
            position: relative;
        }

        .bento-card:hover {
            transform: translateY(-5px);
            background-color: var(--apple-card-hover);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border-color: rgba(212, 175, 55, 0.2);
        }

        /* 金色漸變文字 */
        .text-gold {
            background: linear-gradient(135deg, #f9d423 0%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 價格閃爍動畫 */
        @keyframes flashGreen {
            0% { color: var(--apple-green); text-shadow: 0 0 15px rgba(52, 199, 89, 0.5); }
            100% { color: inherit; text-shadow: none; }
        }
        .price-flash { animation: flashGreen 1.5s ease-out; }

        /* 隱藏滾動條 */
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* 展開面板動畫 */
        #rank-list {
            transition: max-height 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }
        #rank-list.expanded {
            max-height: 2000px;
            opacity: 1;
            margin-top: 1.5rem;
        }

        /* AI 綠點動畫 */
        .ai-dot {
            width: 8px; height: 8px;
            background-color: var(--apple-green);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px var(--apple-green);
            animation: pulse-green 2s infinite;
        }
        @keyframes pulse-green {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="p-4 sm:p-8">

    <div class="max-w-6xl mx-auto space-y-10">
        
        <!-- 頂部導航 -->
        <header class="flex justify-between items-center py-4">
            <h1 class="text-3xl font-black tracking-tighter italic">TCG INVEST</h1>
            <div class="flex items-center gap-4">
                <div class="text-[10px] font-bold text-gray-500 tracking-widest uppercase">Live Monitoring</div>
                <div class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center border border-white/10">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>
        </header>

        <!-- 🏆 價格排行榜 (Bento Grid) -->
        <section class="space-y-6">
            <div class="flex items-center gap-2 px-2">
                <span class="text-xl">🏆</span>
                <h2 class="text-xl font-bold tracking-tight">價格實時排行榜</h2>
            </div>

            <div id="leaderboard-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- NO.1 巨圖卡片 -->
                <div id="no1-card" class="col-span-1 md:col-span-2">
                    <div class="bento-card p-8 sm:p-12 flex flex-col md:flex-row gap-8 items-center min-h-[450px]">
                        <div class="absolute -top-10 -left-10 text-[12rem] opacity-[0.03] font-black italic select-none">01</div>
                        <div class="w-full md:w-72 aspect-[3/4] shrink-0 relative z-10">
                            <img id="no1-img" src="" class="w-full h-full object-contain drop-shadow-2xl transform hover:scale-105 transition-transform duration-700" referrerPolicy="no-referrer">
                        </div>
                        <div class="flex-1 space-y-6 z-10 text-center md:text-left">
                            <div class="flex items-center justify-center md:justify-start gap-3">
                                <span class="px-3 py-1 bg-blue-600 text-white text-[10px] font-black rounded-full uppercase tracking-widest">Market Leader</span>
                                <span id="no1-source" class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">---</span>
                            </div>
                            <h3 id="no1-name" class="text-4xl sm:text-6xl font-black tracking-tighter leading-none">載入中...</h3>
                            <div class="flex flex-wrap justify-center md:justify-start items-baseline gap-6">
                                <span id="no1-price" class="text-5xl sm:text-7xl font-black text-gold tracking-tighter">HK$ --</span>
                                <div class="flex items-center gap-2 text-green-400 font-black text-2xl">
                                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5.293 9.707a1 1 0 010-1.414l4-4a1 1 0 011.414 0l4 4a1 1 0 01-1.414 1.414L11 7.414V15a1 1 0 11-2 0V7.414L6.707 9.707a1 1 0 01-1.414 0z" clip-rule="evenodd"></path></svg>
                                    <span>+15.4%</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- NO.2 & NO.3 -->
                <div id="no2-card" class="col-span-1">
                    <div class="bento-card p-6 flex items-center gap-6 h-full">
                        <div class="w-24 aspect-[3/4] shrink-0">
                            <img id="no2-img" src="" class="w-full h-full object-contain drop-shadow-xl" referrerPolicy="no-referrer">
                        </div>
                        <div class="flex-1">
                            <span class="text-xs font-black opacity-20 block mb-1 uppercase">NO.2</span>
                            <h4 id="no2-name" class="font-bold text-sm truncate mb-2">---</h4>
                            <p id="no2-price" class="text-2xl font-black text-white">HK$ --</p>
                        </div>
                    </div>
                </div>
                <div id="no3-card" class="col-span-1">
                    <div class="bento-card p-6 flex items-center gap-6 h-full">
                        <div class="w-24 aspect-[3/4] shrink-0">
                            <img id="no3-img" src="" class="w-full h-full object-contain drop-shadow-xl" referrerPolicy="no-referrer">
                        </div>
                        <div class="flex-1">
                            <span class="text-xs font-black opacity-20 block mb-1 uppercase">NO.3</span>
                            <h4 id="no3-name" class="font-bold text-sm truncate mb-2">---</h4>
                            <p id="no3-price" class="text-2xl font-black text-white">HK$ --</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 🏆 情報區 -->
        <section class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div class="bento-card p-8 bg-gradient-to-br from-blue-600 to-blue-400 !text-white">
                <p class="text-xs font-bold uppercase tracking-widest opacity-80 mb-2">本週升幅榜</p>
                <h3 class="text-3xl font-black">+24.5%</h3>
                <p class="text-sm mt-2 font-medium">Lugia V (Alt Art)</p>
            </div>
            <div class="bento-card p-8 border-dashed border-2 border-white/10 flex flex-col justify-center">
                <p class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">趨勢分析</p>
                <p class="text-base font-semibold leading-snug">
                    151 系列供應量持續下降，市場支撐位強勁。
                </p>
            </div>
        </section>

        <!-- 展開面板 (NO.4 - NO.10) -->
        <section>
            <button id="expand-btn" class="w-full py-6 bento-card flex items-center justify-center gap-3 text-sm font-bold hover:bg-white/5 transition-all">
                <span>查看 NO.4 - NO.10 的完整實時排行榜</span>
                <svg id="expand-icon" class="w-5 h-5 transition-transform duration-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </button>
            <div id="rank-list" class="space-y-3">
                <!-- 由 JS 填充 -->
            </div>
        </section>

        <!-- 頁尾 -->
        <footer class="py-20 text-center space-y-4 opacity-30">
            <div class="flex items-center justify-center gap-2">
                <span class="ai-dot"></span>
                <span class="text-[10px] font-bold tracking-widest uppercase">AI Driven by OpenClaw</span>
            </div>
            <p class="text-[10px]">© 2026 TCG INVEST NET. ALL RIGHTS RESERVED.</p>
        </footer>
    </div>

    <!-- Firebase SDK (Modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // --- 1. Firebase 配置 ---
        const firebaseConfig = {
            apiKey: "AIzaSyDSwhKXm7KqaHVO2kb2PQ6qmarySPcZyJ0",
            authDomain: "gen-lang-client-0326385388.firebaseapp.com",
            projectId: "gen-lang-client-0326385388",
            storageBucket: "gen-lang-client-0326385388.firebasestorage.app",
            messagingSenderId: "122336191579",
            appId: "1:122336191579:web:2de07c0acb51b8b24c8b7e"
        };

        const app = initializeApp(firebaseConfig);
        
        // --- 2. 指定 Database ID "abcd" ---
        const db = getFirestore(app, "abcd");

        // 狀態追蹤
        let lastPrices = {};

        // 格式化 HK$
        const formatHKD = (val) => new Intl.NumberFormat('zh-HK', { style: 'currency', currency: 'HKD', minimumFractionDigits: 0 }).format(val || 0);

        // --- 3. 實時監聽 card_prices 集合 ---
        const q = query(collection(db, "card_prices"), orderBy("latest_price_hkd", "desc"));

        onSnapshot(q, (snapshot) => {
            const cards = [];
            snapshot.forEach(doc => cards.push({ id: doc.id, ...doc.data() }));
            
            if (cards.length > 0) {
                renderUI(cards);
            }
        });

        function renderUI(data) {
            const rankList = document.getElementById('rank-list');

            // --- 渲染 NO.1 ---
            const c1 = data[0];
            document.getElementById('no1-name').innerText = c1.card_name || '未知卡片';
            document.getElementById('no1-price').innerText = formatHKD(c1.latest_price_hkd);
            document.getElementById('no1-img').src = c1.url || '';
            document.getElementById('no1-source').innerText = c1.source || 'Market';

            // --- 渲染 NO.2 & NO.3 ---
            if (data[1]) {
                document.getElementById('no2-name').innerText = data[1].card_name;
                document.getElementById('no2-price').innerText = formatHKD(data[1].latest_price_hkd);
                document.getElementById('no2-img').src = data[1].url;
            }
            if (data[2]) {
                document.getElementById('no3-name').innerText = data[2].card_name;
                document.getElementById('no3-price').innerText = formatHKD(data[2].latest_price_hkd);
                document.getElementById('no3-img').src = data[2].url;
            }

            // --- 渲染其餘列表 (NO.4 - 10) ---
            let listHtml = "";
            data.slice(3, 10).forEach((c, i) => {
                listHtml += `
                    <div class="bento-card p-5 flex items-center justify-between bg-white/5">
                        <div class="flex items-center gap-4">
                            <span class="text-xs font-black opacity-20 w-4">${i + 4}</span>
                            <img src="${c.url}" class="w-10 h-10 object-contain" referrerPolicy="no-referrer">
                            <p class="text-sm font-bold truncate w-32 sm:w-64">${c.card_name}</p>
                        </div>
                        <div class="text-right">
                            <p id="price-${c.id}" class="text-sm font-black">${formatHKD(c.latest_price_hkd)}</p>
                            <p class="text-[10px] font-bold text-green-400">+0.0%</p>
                        </div>
                    </div>
                `;
            });
            rankList.innerHTML = listHtml;

            // 價格閃爍邏輯
            data.forEach(c => {
                const currentPrice = c.latest_price_hkd;
                if (lastPrices[c.id] !== undefined && lastPrices[c.id] !== currentPrice) {
                    const elId = (c.id === data[0].id) ? 'no1-price' : `price-${c.id}`;
                    const el = document.getElementById(elId);
                    if (el) {
                        el.classList.remove('price-flash');
                        void el.offsetWidth; // 強制重繪
                        el.classList.add('price-flash');
                    }
                }
                lastPrices[c.id] = currentPrice;
            });
        }

        // 展開邏輯
        const expandBtn = document.getElementById('expand-btn');
        const rankListEl = document.getElementById('rank-list');
        const expandIcon = document.getElementById('expand-icon');

        expandBtn.addEventListener('click', () => {
            const isExpanded = rankListEl.classList.toggle('expanded');
            expandIcon.style.transform = isExpanded ? 'rotate(180deg)' : 'rotate(0deg)';
            expandBtn.querySelector('span').innerText = isExpanded ? '收起排行榜' : '查看 NO.4 - NO.10 的完整實時排行榜';
        });
    </script>
</body>
</html>
