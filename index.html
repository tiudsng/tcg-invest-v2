<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TCG INVEST | 實時價格追蹤</title>
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --apple-bg: #1c1c1e;
            --apple-card: #2c2c2e;
            --apple-text: #ffffff;
            --apple-blue: #0071e3;
            --apple-green: #34c759;
            --apple-red: #ff3b30;
            --apple-gold: #d4af37;
        }

        body {
            background-color: var(--apple-bg);
            color: var(--apple-text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.5s ease;
        }

        /* Bento Grid 圓角與陰影 */
        .bento-card {
            background-color: var(--apple-card);
            border-radius: 2.5rem; /* rounded-3xl */
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
            position: relative;
        }

        .bento-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border-color: rgba(255, 255, 255, 0.1);
        }

        /* 價格閃爍特效 */
        @keyframes flashGreen {
            0% { color: var(--apple-green); text-shadow: 0 0 15px rgba(52, 199, 89, 0.5); }
            100% { color: inherit; text-shadow: none; }
        }
        .price-flash { animation: flashGreen 1.5s ease-out; }

        /* AI 發光圓點 */
        .ai-dot {
            width: 8px;
            height: 8px;
            background-color: var(--apple-green);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px var(--apple-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* 隱藏滾動條 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 展開動畫 */
        #rank-list {
            max-height: 0;
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
        }
        #rank-list.expanded {
            max-height: 2000px;
            opacity: 1;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body class="p-4 sm:p-8">

    <div class="max-w-5xl mx-auto space-y-8">
        
        <!-- 頂部導航 -->
        <header class="flex justify-between items-center py-4">
            <h1 class="text-3xl font-black tracking-tighter italic">TCG INVEST</h1>
            <div class="flex items-center gap-4">
                <div class="text-[10px] font-bold text-gray-500 tracking-widest uppercase">Live Monitoring</div>
                <button id="theme-toggle" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center border border-white/10">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                </button>
            </div>
        </header>

        <!-- 🏆 價格磅排行榜 -->
        <section class="space-y-6">
            <div class="flex items-center gap-2 px-2">
                <span class="text-xl">🏆</span>
                <h2 class="text-xl font-bold tracking-tight">價格實時排行榜</h2>
            </div>

            <!-- Bento Grid: Top 3 -->
            <div id="leaderboard-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- NO.1 巨圖 (由 JS 填充) -->
                <div id="no1-container" class="col-span-1 md:col-span-2">
                    <div class="animate-pulse bento-card h-96 bg-white/5"></div>
                </div>
                
                <!-- NO.2 & NO.3 (由 JS 填充) -->
                <div id="no2-container" class="col-span-1">
                    <div class="animate-pulse bento-card h-48 bg-white/5"></div>
                </div>
                <div id="no3-container" class="col-span-1">
                    <div class="animate-pulse bento-card h-48 bg-white/5"></div>
                </div>
            </div>
        </section>

        <!-- 🏆 情報區 -->
        <section class="space-y-6">
            <div class="flex items-center gap-2 px-2">
                <span class="text-xl">🔥</span>
                <h2 class="text-xl font-bold tracking-tight">市場情報板塊</h2>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                <div class="bento-card p-8 bg-gradient-to-br from-blue-600 to-blue-400 !text-white">
                    <p class="text-xs font-bold uppercase tracking-widest opacity-80 mb-2">本週卡價升幅榜</p>
                    <h3 class="text-3xl font-black">+42.8%</h3>
                    <p class="text-sm mt-2 font-medium">噴火龍 ex SAR (151)</p>
                    <div class="mt-6 text-[10px] font-bold bg-white/20 w-fit px-2 py-1 rounded-full">AI 預測：持續看漲</div>
                </div>
                <div class="bento-card p-8 border-dashed border-2 border-white/10 flex flex-col justify-center">
                    <p class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">趨勢分析</p>
                    <p class="text-base font-semibold leading-snug">
                        日本市場 Lugia V 供應量減少，eBay 成交價已突破支撐位。
                    </p>
                </div>
            </div>
        </section>

        <!-- 展開面板 (NO.4 - NO.10) -->
        <section>
            <button id="expand-btn" class="w-full py-6 bento-card flex items-center justify-center gap-3 text-sm font-bold hover:bg-white/5 transition-all active:scale-95">
                <span>查看 NO.4 - NO.10 完整排行榜</span>
                <svg id="expand-icon" class="w-5 h-5 transition-transform duration-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </button>
            <div id="rank-list" class="space-y-3">
                <!-- 列表由 JS 填充 -->
            </div>
        </section>

        <!-- 頁尾 -->
        <footer class="py-20 text-center space-y-4 opacity-30">
            <div class="flex items-center justify-center gap-2">
                <span class="ai-dot"></span>
                <span class="text-[10px] font-bold tracking-widest uppercase">AI Driven by OpenClaw</span>
            </div>
            <p class="text-[10px] font-medium tracking-tight">© 2026 TCG INVEST NET. ALL RIGHTS RESERVED.</p>
        </footer>
    </div>

    <!-- Firebase SDK (Modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // --- Firebase 配置 ---
        const firebaseConfig = {
            apiKey: "AIzaSyDSwhKXm7KqaHVO2kb2PQ6qmarySPcZyJ0",
            authDomain: "gen-lang-client-0326385388.firebaseapp.com",
            projectId: "gen-lang-client-0326385388",
            storageBucket: "gen-lang-client-0326385388.firebasestorage.app",
            messagingSenderId: "122336191579",
            appId: "1:122336191579:web:2de07c0acb51b8b24c8b7e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app, "ai-studio-dac23e7c-cc41-4b77-8dea-7e8421e03c6a");

        // 狀態追蹤
        let lastPrices = {};

        // 格式化 HK$
        const formatHKD = (val) => new Intl.NumberFormat('zh-HK', { style: 'currency', currency: 'HKD', minimumFractionDigits: 0 }).format(val || 0);

        // 實時監聽數據
        const q = query(collection(db, "products"), orderBy("price", "desc"));

        onSnapshot(q, (snapshot) => {
            const products = [];
            snapshot.forEach(doc => products.push({ id: doc.id, ...doc.data() }));
            
            if (products.length > 0) {
                renderUI(products);
            }
        });

        function renderUI(data) {
            const no1Container = document.getElementById('no1-container');
            const no2Container = document.getElementById('no2-container');
            const no3Container = document.getElementById('no3-container');
            const rankList = document.getElementById('rank-list');

            // --- 渲染 NO.1 ---
            const p1 = data[0];
            no1Container.innerHTML = `
                <div class="bento-card p-8 sm:p-12 flex flex-col md:flex-row items-center gap-8 min-h-[400px]">
                    <div class="absolute -top-10 -left-10 text-[12rem] opacity-[0.03] font-black italic select-none">01</div>
                    <div class="w-full md:w-64 aspect-[3/4] shrink-0 relative z-10">
                        <img src="${p1.imageUrl}" class="w-full h-full object-contain drop-shadow-2xl transform hover:scale-105 transition-transform duration-700" referrerPolicy="no-referrer">
                    </div>
                    <div class="flex-1 space-y-6 z-10 text-center md:text-left">
                        <div class="flex items-center justify-center md:justify-start gap-3">
                            <span class="px-3 py-1 bg-blue-600 text-white text-[10px] font-black rounded-full uppercase tracking-widest">Market Leader</span>
                            <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">${p1.source || 'eBay'}</span>
                        </div>
                        <h3 class="text-4xl sm:text-6xl font-black tracking-tighter leading-none">${p1.name}</h3>
                        <div class="flex flex-wrap justify-center md:justify-start items-baseline gap-4">
                            <span id="price-${p1.id}" class="text-5xl sm:text-7xl font-black tracking-tighter text-[#d4af37]">${formatHKD(p1.price)}</span>
                            <span class="text-xl font-bold ${p1.change >= 0 ? 'text-[#34c759]' : 'text-[#ff3b30]'}">
                                ${p1.change >= 0 ? '▲' : '▼'} ${Math.abs(p1.change || 0)}%
                            </span>
                        </div>
                    </div>
                </div>
            `;

            // --- 渲染 NO.2 & NO.3 ---
            [data[1], data[2]].forEach((p, idx) => {
                const container = idx === 0 ? no2Container : no3Container;
                if (!p) return;
                container.innerHTML = `
                    <div class="bento-card p-6 flex items-center gap-6 h-full">
                        <div class="absolute top-4 right-6 text-5xl opacity-[0.03] font-black italic">0${idx + 2}</div>
                        <div class="w-20 sm:w-24 aspect-[3/4] shrink-0">
                            <img src="${p.imageUrl}" class="w-full h-full object-contain drop-shadow-xl" referrerPolicy="no-referrer">
                        </div>
                        <div class="flex-1 min-w-0">
                            <span class="text-xs font-black opacity-20 block mb-1 uppercase">NO.${idx + 2}</span>
                            <h4 class="font-bold text-sm truncate mb-2">${p.name}</h4>
                            <p id="price-${p.id}" class="text-xl font-black text-white">${formatHKD(p.price)}</p>
                            <p class="text-[10px] font-bold ${p.change >= 0 ? 'text-[#34c759]' : 'text-[#ff3b30]'}">
                                ${p.change >= 0 ? '+' : ''}${p.change || 0}%
                            </p>
                        </div>
                    </div>
                `;
            });

            // --- 渲染其餘列表 (NO.4 - 10) ---
            let listHtml = "";
            data.slice(3, 10).forEach((p, i) => {
                listHtml += `
                    <div class="bento-card p-5 flex items-center justify-between bg-white/5">
                        <div class="flex items-center gap-4">
                            <span class="text-xs font-black opacity-20 w-4">${i + 4}</span>
                            <img src="${p.imageUrl}" class="w-10 h-10 object-contain" referrerPolicy="no-referrer">
                            <p class="text-sm font-bold truncate w-32 sm:w-64">${p.name}</p>
                        </div>
                        <div class="text-right">
                            <p id="price-${p.id}" class="text-sm font-black">${formatHKD(p.price)}</p>
                            <p class="text-[10px] font-bold ${p.change >= 0 ? 'text-[#34c759]' : 'text-[#ff3b30]'}">
                                ${p.change >= 0 ? '+' : ''}${p.change || 0}%
                            </p>
                        </div>
                    </div>
                `;
            });
            rankList.innerHTML = listHtml;

            // 檢查價格變動並觸發閃爍
            data.forEach(p => {
                if (lastPrices[p.id] !== undefined && lastPrices[p.id] !== p.price) {
                    const el = document.getElementById(`price-${p.id}`);
                    if (el) {
                        el.classList.remove('price-flash');
                        void el.offsetWidth; // 強制重繪
                        el.classList.add('price-flash');
                    }
                }
                lastPrices[p.id] = p.price;
            });
        }

        // 展開邏輯
        const expandBtn = document.getElementById('expand-btn');
        const rankListEl = document.getElementById('rank-list');
        const expandIcon = document.getElementById('expand-icon');

        expandBtn.addEventListener('click', () => {
            const isExpanded = rankListEl.classList.toggle('expanded');
            expandIcon.style.transform = isExpanded ? 'rotate(180deg)' : 'rotate(0deg)';
            expandBtn.querySelector('span').innerText = isExpanded ? '收起排行榜' : '查看 NO.4 - NO.10 完整排行榜';
        });

        // 模式切換 (簡單實作)
        document.getElementById('theme-toggle').addEventListener('click', () => {
            const isDark = document.body.style.backgroundColor === 'rgb(245, 245, 247)';
            if (!isDark) {
                document.body.style.setProperty('--apple-bg', '#f5f5f7');
                document.body.style.setProperty('--apple-card', '#ffffff');
                document.body.style.setProperty('--apple-text', '#1d1d1f');
            } else {
                document.body.style.setProperty('--apple-bg', '#1c1c1e');
                document.body.style.setProperty('--apple-card', '#2c2c2e');
                document.body.style.setProperty('--apple-text', '#ffffff');
            }
        });
    </script>
</body>
</html>
