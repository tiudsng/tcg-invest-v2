<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCG 實時價格排行榜 | Apple Style Bento (Vanilla JS)</title>
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --apple-bg: #000000;
            --apple-card: #1c1c1e;
            --apple-text: #ffffff;
        }

        body {
            background-color: var(--apple-bg);
            color: var(--apple-text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* 價格閃爍特效 */
        @keyframes flashGreen {
            0% { color: #22c55e; text-shadow: 0 0 15px rgba(34, 197, 94, 0.8); transform: scale(1.05); }
            100% { color: inherit; text-shadow: none; transform: scale(1); }
        }

        .price-flash {
            animation: flashGreen 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .bento-card {
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.6s ease;
            background-color: var(--apple-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .bento-card:hover {
            transform: translateY(-5px) scale(1.01);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border-color: rgba(255, 255, 255, 0.1);
        }

        /* 隱藏展開列表 */
        #remaining-list {
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        #remaining-list.show {
            display: block;
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="max-w-6xl mx-auto px-4 py-12 sm:py-20">
        <!-- Header -->
        <div class="text-center mb-16">
            <h1 class="text-4xl sm:text-6xl font-black tracking-tighter mb-4 bg-gradient-to-b from-white to-gray-500 bg-clip-text text-transparent">
                價格實時排行榜
            </h1>
            <div class="flex items-center justify-center gap-2 text-blue-400 font-bold tracking-widest uppercase text-xs sm:text-sm">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                </span>
                Live Update from Firestore
            </div>
        </div>

        <!-- Bento Grid Container -->
        <div id="leaderboard-container" class="space-y-8">
            <!-- 這裡會由 JavaScript 動態填入內容 -->
            <div class="text-center py-20 text-gray-500 font-bold">正在連接數據庫...</div>
        </div>

        <!-- 展開按鈕 -->
        <div id="expand-section" class="mt-12 hidden">
            <button id="toggle-btn" class="w-full flex items-center justify-center gap-3 py-6 bg-[#1c1c1e] hover:bg-[#2c2c2e] border border-white/5 rounded-3xl text-sm font-bold transition-all active:scale-95">
                <span id="btn-text">查看其餘排名數據</span>
            </button>
            <div id="remaining-list" class="pt-8 space-y-4"></div>
        </div>
    </div>

    <!-- Firebase SDK (v10) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // --- Firebase 配置 ---
        const firebaseConfig = {
            apiKey: "AIzaSyDSwhKXm7KqaHVO2kb2PQ6qmarySPcZyJ0",
            authDomain: "gen-lang-client-0326385388.firebaseapp.com",
            projectId: "gen-lang-client-0326385388",
            storageBucket: "gen-lang-client-0326385388.firebasestorage.app",
            messagingSenderId: "122336191579",
            appId: "1:122336191579:web:2de07c0acb51b8b24c8b7e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app, "ai-studio-dac23e7c-cc41-4b77-8dea-7e8421e03c6a");

        // 儲存舊價格以便比較
        let previousPrices = {};

        // 格式化價格
        const formatPrice = (price) => {
            return new Intl.NumberFormat('zh-HK', {
                style: 'currency',
                currency: 'HKD',
                minimumFractionDigits: 0
            }).format(price);
        };

        // 判斷漲跌顏色
        const getChangeClass = (change) => {
            if (!change) return 'text-gray-400';
            return change.startsWith('+') ? 'text-green-400' : 'text-red-400';
        };

        // 渲染主函數
        const renderLeaderboard = (products) => {
            const container = document.getElementById('leaderboard-container');
            const expandSection = document.getElementById('expand-section');
            const remainingList = document.getElementById('remaining-list');
            
            if (products.length === 0) return;

            const top1 = products[0];
            const top2 = products[1];
            const top3 = products[2];
            const others = products.slice(3);

            // 1. 渲染 NO.1
            let top1Html = `
                <div class="bento-card relative rounded-[3rem] p-8 sm:p-12 flex flex-col md:flex-row gap-8 sm:gap-12 overflow-hidden">
                    <div class="absolute -top-10 -left-10 text-9xl opacity-10 font-black italic select-none">01</div>
                    <div class="absolute top-8 right-8">
                        <div class="bg-white text-black text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Market Leader</div>
                    </div>
                    <div class="w-full md:w-64 aspect-[3/4] shrink-0 rounded-3xl overflow-hidden shadow-2xl border border-white/10 relative z-10">
                        <img src="${top1.image_url}" class="w-full h-full object-cover" referrerPolicy="no-referrer">
                    </div>
                    <div class="flex-1 flex flex-col justify-center z-10">
                        <div class="mb-8">
                            <h2 class="text-5xl sm:text-7xl font-black tracking-tighter mb-4">NO.1</h2>
                            <h3 class="text-2xl sm:text-4xl font-bold leading-tight">
                                ${top1.name_zh}
                                <span class="block text-lg sm:text-xl text-gray-500 mt-2">[${top1.set_name || 'TCG'}]</span>
                            </h3>
                        </div>
                        <div class="flex items-baseline gap-6">
                            <span class="${getChangeClass(top1.market_data?.change_24h)} text-3xl sm:text-5xl font-black tracking-tighter">
                                ${top1.market_data?.change_24h || '-'}
                            </span>
                            <span class="text-gray-500 text-2xl sm:text-4xl font-bold">
                                / <span id="price-${top1.id}" class="text-white transition-all duration-300">${formatPrice(top1.market_data?.snkrdunk_price || 0)}</span>
                            </span>
                        </div>
                    </div>
                </div>
            `;

            // 2. 渲染 NO.2 & NO.3
            let gridHtml = `<div class="grid grid-cols-1 sm:grid-cols-2 gap-8">`;
            [top2, top3].forEach((card, idx) => {
                if (!card) return;
                gridHtml += `
                    <div class="bento-card rounded-[2.5rem] p-8 flex gap-6 relative overflow-hidden">
                        <div class="absolute top-4 right-6 text-5xl opacity-5 font-black italic">0${idx + 2}</div>
                        <div class="w-24 sm:w-32 aspect-[3/4] shrink-0 rounded-2xl overflow-hidden shadow-xl border border-white/10">
                            <img src="${card.image_url}" class="w-full h-full object-cover" referrerPolicy="no-referrer">
                        </div>
                        <div class="flex-1 flex flex-col justify-between py-2">
                            <div>
                                <span class="text-3xl font-black tracking-tighter block mb-2">NO.${card.rank}</span>
                                <h3 class="text-base font-bold line-clamp-2">${card.name_zh}</h3>
                            </div>
                            <div class="mt-4">
                                <div class="${getChangeClass(card.market_data?.change_24h)} text-2xl font-black tracking-tight">
                                    ${card.market_data?.change_24h || '-'}
                                </div>
                                <div class="text-gray-500 text-sm font-bold">
                                    / <span id="price-${card.id}" class="text-white transition-all duration-300">${formatPrice(card.market_data?.snkrdunk_price || 0)}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            gridHtml += `</div>`;

            container.innerHTML = top1Html + gridHtml;

            // 3. 渲染其餘列表
            if (others.length > 0) {
                expandSection.classList.remove('hidden');
                document.getElementById('btn-text').innerText = `查看其餘 ${others.length} 名排名數據`;
                
                let listHtml = "";
                others.forEach(card => {
                    listHtml += `
                        <div class="bg-[#1c1c1e]/50 rounded-3xl p-5 flex items-center gap-6 border border-white/5 hover:bg-[#1c1c1e] transition-all group">
                            <div class="w-10 font-black text-gray-700 text-2xl italic group-hover:text-blue-500 transition-colors">${card.rank}</div>
                            <div class="w-14 aspect-[3/4] shrink-0 rounded-xl overflow-hidden border border-white/10">
                                <img src="${card.image_url}" class="w-full h-full object-cover" referrerPolicy="no-referrer">
                            </div>
                            <div class="flex-1 min-w-0">
                                <h4 class="font-bold truncate">${card.name_zh}</h4>
                                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">${card.set_name || 'TCG'}</p>
                            </div>
                            <div class="text-right">
                                <div class="font-black text-lg">
                                    <span id="price-${card.id}">${formatPrice(card.market_data?.snkrdunk_price || 0)}</span>
                                </div>
                                <div class="${getChangeClass(card.market_data?.change_24h)} font-bold text-sm">
                                    ${card.market_data?.change_24h || '-'}
                                </div>
                            </div>
                        </div>
                    `;
                });
                remainingList.innerHTML = listHtml;
            }

            // 檢查價格變動並觸發閃爍
            products.forEach(p => {
                const newPrice = p.market_data?.snkrdunk_price;
                if (previousPrices[p.id] !== undefined && previousPrices[p.id] !== newPrice) {
                    const el = document.getElementById(`price-${p.id}`);
                    if (el) {
                        el.classList.remove('price-flash');
                        void el.offsetWidth; // 強制重繪以重啟動畫
                        el.classList.add('price-flash');
                    }
                }
                previousPrices[p.id] = newPrice;
            });
        };

        // 監聽數據庫
        const q = query(collection(db, "products"), orderBy("rank", "asc"));
        onSnapshot(q, (snapshot) => {
            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderLeaderboard(data);
        });

        // 展開/收起邏輯
        document.getElementById('toggle-btn').addEventListener('click', () => {
            const list = document.getElementById('remaining-list');
            const btnText = document.getElementById('btn-text');
            const isShowing = list.classList.toggle('show');
            btnText.innerText = isShowing ? '收起詳細排名' : `查看其餘排名數據`;
        });
    </script>
</body>
</html>
